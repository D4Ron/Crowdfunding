<div class="notifications-page">
  <div class="notif-header">
    <h1>Notifications</h1>
    <button class="btn-text-gold" (click)="markAllRead()">Tout marquer comme lu</button>
  </div>

  @if (loading) {
  <div style="text-align:center;padding:60px">
    <div
      style="display:inline-block;width:40px;height:40px;border:4px solid #E5E7EB;border-top-color:#C9A86A;border-radius:50%;animation:spin 0.8s linear infinite">
    </div>
  </div>
  }

  @if (!loading) {
  <div class="notif-card">
    @for (notif of notifications; track notif.id) {
    <div class="notif-item" [class.unread]="!notif.lu">
      <div class="notif-icon" [ngClass]="typeIcon(notif.type)">
        <i class="fa-solid" [ngClass]="{
              'fa-check-circle': typeIcon(notif.type) === 'success',
              'fa-exclamation-triangle': typeIcon(notif.type) === 'warning',
              'fa-info-circle': typeIcon(notif.type) === 'info'
            }"></i>
      </div>

      <div class="notif-details">
        <div class="notif-main">
          <p>{{ notif.message }}</p>
        </div>
        <div class="notif-meta">
          <span class="time">{{ notif.createdAt | date:'dd/MM/yyyy HH:mm' }}</span>
          @if (!notif.lu) {
          <span class="unread-dot"></span>
          }
        </div>
      </div>
    </div>
    }
  </div>
  }
</div>
