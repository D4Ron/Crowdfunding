<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="brand">
                <div class="logo"></div>
                <span class="brand-name">FoundTogo</span>
            </div>
            <h1>Bon retour parmi nous</h1>
            <p>Connectez-vous pour gérer vos campagnes et contributions.</p>
        </div>

        <form (submit)="onSubmit()" class="auth-form">
            <div class="form-group">
                <label for="email">Adresse email</label>
                <input type="email" id="email" name="email" [ngModel]="email()" (ngModelChange)="email.set($event)"
                    placeholder="votre@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" [ngModel]="password()"
                    (ngModelChange)="password.set($event)" placeholder="••••••••" required>
            </div>

            <div class="form-error" *ngIf="error()">
                {{ error() }}
            </div>

            <button type="submit" class="btn btn-primary btn-block" [disabled]="loading()">
                {{ loading() ? 'Connexion en cours...' : 'Se connecter' }}
            </button>

            <div class="auth-footer">
                Pas encore de compte ? <a routerLink="/register">Inscrivez-vous</a>
            </div>
        </form>
    </div>
</div>
