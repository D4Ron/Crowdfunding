<h2 class="page-title"><span class="title-dot"></span> Notifications</h2>

<section class="card">
    <div class="notif-header">
        <span class="notif-bell">🔔</span>
        <span class="notif-title">Centre de notifications</span>
        <button class="btn btn-ghost" (click)="markAll()" [disabled]="notifications().length === 0">Tout marquer comme
            lu</button>
    </div>

    <div *ngIf="notifications().length > 0; else empty">
        <div class="notif-item" *ngFor="let n of notifications()" [class.read]="n.read">
            <span class="notif-icon" [ngClass]="n.type ?? 'info'"></span>
            <div class="notif-body">
                <div class="notif-name" [class.muted]="n.read">{{ n.title }}</div>
                <div class="notif-desc" *ngIf="n.description">{{ n.description }}</div>
                <div class="notif-time">{{ n.timestamp ?? '—' }}</div>
            </div>
            <button class="toggle-btn" (click)="toggle(n.id)" [class.read]="n.read"
                [title]="n.read ? 'Marquer non-lu' : 'Marquer lu'">
                {{ n.read ? '◎' : '●' }}
            </button>
        </div>
    </div>

    <ng-template #empty>
        <div class="empty-text">Aucune notification disponible.</div>
    </ng-template>
</section>
