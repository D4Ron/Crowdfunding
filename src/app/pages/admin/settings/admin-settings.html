<h2 class="page-title"><span class="title-dot"></span> Paramètres administrateur</h2>

<section class="card profile-card">
    <div class="profile-avatar">{{ initials }}</div>
    <div class="profile-info">
        <div class="profile-name">{{ nom }}</div>
        <div class="profile-email">{{ email }}</div>
    </div>
</section>

<section class="card">
    <div class="section-title">Sécurité — Changer le mot de passe</div>
    <div class="form-grid">
        <div class="form-group">
            <label class="form-label">Nouveau mot de passe</label>
            <input class="form-input" type="password" [value]="password()"
                (input)="password.set($any($event.target).value)" />
        </div>
        <div class="form-group">
            <label class="form-label">Confirmer le mot de passe</label>
            <input class="form-input" type="password" [value]="confirm()"
                (input)="confirm.set($any($event.target).value)" />
        </div>
    </div>
    <div class="error-msg" *ngIf="passwordError()">{{ passwordError() }}</div>
    <button class="btn btn-primary" (click)="onSavePassword()">Enregistrer</button>
</section>

<section class="card">
    <div class="section-title">Préférences de notifications</div>
    <div class="prefs-grid">
        <label class="pref-row">
            <input type="checkbox" [checked]="settings().emailNotifications ?? false"
                (change)="onToggleEmail($event)" />
            <span>Notifications par email</span>
        </label>
        <label class="pref-row">
            <input type="checkbox" [checked]="settings().pushNotifications ?? false" (change)="onTogglePush($event)" />
            <span>Notifications push</span>
        </label>
    </div>
</section>
